<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG Tiles | Customer Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .signin-heading {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 300;
        }
    </style>
</head>
<body class="bg-[#0f2537] min-h-screen flex flex-col justify-center items-center p-4">

    <div class="mb-8 text-center flex items-center justify-center space-x-2">
        <div class="flex items-center bg-gradient-to-br from-amber-500 to-amber-600 p-2 rounded-lg shadow-md">
            <i class="fa-solid fa-cubes text-white text-xl"></i>
        </div>
        <div class="text-3xl font-bold tracking-wide text-white font-sans">
            GG<span class="text-amber-500 font-light">Tiles</span>
        </div>
    </div>

    <main class="w-full max-w-[480px] bg-white p-10 shadow-2xl transition-all duration-300">
        
        {% if msg %}
        <div class="bg-amber-50 border-l-4 border-amber-500 text-amber-800 text-xs p-3.5 mb-6 rounded flex items-start space-x-2">
            <i class="fa-solid fa-circle-info mt-0.5 text-amber-600"></i>
            <span>{{ msg }}</span>
        </div>
        {% endif %}

        <div id="signin-view">
            <h1 class="signin-heading text-[40px] text-[#222222] mb-6 leading-tight">Sign in</h1>
            
            <form action="/customer/login" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm text-[#222222] italic mb-1.5 font-medium">Username or Email Address</label>
                    <input type="text" name="identity" required class="w-full bg-white border border-gray-300 text-gray-900 px-3 py-2 text-base outline-none focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] transition shadow-sm">
                </div>

                <div>
                    <label class="block text-sm text-[#222222] italic mb-1.5 font-medium">Password</label>
                    <input type="password" name="password" required class="w-full bg-white border border-gray-300 text-gray-900 px-3 py-2 text-base outline-none focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] transition shadow-sm">
                </div>

                <div class="flex items-center">
                    <input id="keep_signed_in" type="checkbox" class="w-4 h-4 text-[#1a73e8] border-gray-300 rounded">
                    <label for="keep_signed_in" class="ml-2.5 text-[14px] text-[#333333] select-none cursor-pointer">Keep me signed in</label>
                </div>

                <div class="pt-2">
                    <button type="submit" class="bg-[#0062e6] hover:bg-[#0052c4] text-white px-5 py-2 rounded text-sm font-medium tracking-wide transition shadow-sm">Sign in</button>
                </div>
            </form>

            <div class="mt-8 pt-4 border-t border-gray-100 space-y-2.5 text-[14px]">
                <div><a href="#" class="text-[#0066cc] hover:underline">Forgot your password?</a></div>
                <div class="text-[#222222]">
                    Don't have a GG Tiles account? 
                    <button onclick="toggleView('register')" class="text-[#0066cc] hover:underline font-medium focus:outline-none">Sign up</button>
                </div>
            </div>
        </div>

        <div id="register-view" class="hidden">
            <h1 class="signin-heading text-[40px] text-[#222222] mb-6 leading-tight">Sign up</h1>
            
            <form action="/customer/register" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm text-[#222222] italic mb-1.5 font-medium">Full Name</label>
                    <input type="text" name="name" required class="w-full bg-white border border-gray-300 text-gray-900 px-3 py-2 text-base outline-none focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] transition shadow-sm">
                </div>

                <div>
                    <label class="block text-sm text-[#222222] italic mb-1.5 font-medium">Username</label>
                    <input type="text" name="username" required class="w-full bg-white border border-gray-300 text-gray-900 px-3 py-2 text-base outline-none focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] transition shadow-sm">
                </div>

                <div>
                    <label class="block text-sm text-[#222222] italic mb-1.5 font-medium">Email Address</label>
                    <input type="email" name="email" required class="w-full bg-white border border-gray-300 text-gray-900 px-3 py-2 text-base outline-none focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] transition shadow-sm">
                </div>

                <div>
                    <label class="block text-sm text-[#222222] italic mb-1.5 font-medium">Password</label>
                    <input type="password" name="password" required class="w-full bg-white border border-gray-300 text-gray-900 px-3 py-2 text-base outline-none focus:border-[#1a73e8] focus:ring-1 focus:ring-[#1a73e8] transition shadow-sm">
                </div>

                <div class="pt-2">
                    <button type="submit" class="bg-[#0062e6] hover:bg-[#0052c4] text-white px-5 py-2 rounded text-sm font-medium tracking-wide transition shadow-sm">Create Account</button>
                </div>
            </form>

            <div class="mt-8 pt-4 border-t border-gray-100 text-[14px]">
                <div class="text-[#222222]">
                    Already have an account? 
                    <button onclick="toggleView('signin')" class="text-[#0066cc] hover:underline font-medium focus:outline-none">Sign in</button>
                </div>
            </div>
        </div>

        <div class="mt-4 text-[14px] text-xs text-gray-500">
            <a href="#" class="hover:underline flex items-center inline-flex">
                Privacy policy <i class="fa-solid fa-arrow-up-right-from-square text-[10px] ml-1.5 opacity-70"></i>
            </a>
        </div>

    </main>

    <script>
        function toggleView(target) {
            const signinView = document.getElementById('signin-view');
            const registerView = document.getElementById('register-view');
            
            if (target === 'register') {
                signinView.classList.add('hidden');
                registerView.classList.remove('hidden');
            } else {
                registerView.classList.add('hidden');
                signinView.classList.remove('hidden');
            }
        }
    </script>

    {% if show_register %}
    <script>
        toggleView('register');
    </script>
    {% endif %}
</body>
</html>
