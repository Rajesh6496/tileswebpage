<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG Tiles | Staff Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col justify-center items-center p-4">
    
    <!-- Admin Header -->
    <div class="mb-8 text-center">
        <div class="text-3xl font-serif font-black tracking-widest text-slate-900">GG<span class="text-blue-600 font-sans font-light text-2xl ml-1 border-l border-slate-300 pl-2 tracking-normal">STAFF</span></div>
        <p class="text-sm text-slate-500 mt-2 font-mono tracking-widest uppercase">Secure Administration</p>
    </div>

    <!-- Login Container -->
    <main class="w-full max-w-md bg-white p-8 sm:p-10 rounded-3xl shadow-xl border border-slate-200">
        <h1 class="text-2xl font-serif font-bold text-slate-900 mb-6">System Login</h1>

        <!-- Error Handling -->
        {% if error %}
        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 text-xs p-3.5 mb-6 rounded flex items-start space-x-2 shadow-sm">
            <i class="fa-solid fa-triangle-exclamation mt-0.5"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- FORM: Fixed action URL prevents the 405 error -->
        <form action="/admin/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Staff Username</label>
                <input type="text" name="username" required class="w-full bg-slate-50 border border-slate-200 text-slate-900 px-4 py-3 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition outline-none font-medium">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Security Key</label>
                <input type="password" name="password" required class="w-full bg-slate-50 border border-slate-200 text-slate-900 px-4 py-3 rounded-xl focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition outline-none font-medium">
            </div>
            
            <div class="pt-2">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl uppercase tracking-wider transition shadow-md flex justify-center items-center space-x-2">
                    <i class="fa-solid fa-unlock-keyhole"></i>
                    <span>Authorize Access</span>
                </button>
            </div>
        </form>

        <!-- Return Link -->
        <div class="mt-6 pt-4 border-t border-slate-100 text-center">
            <a href="/login" class="text-xs font-bold text-slate-400 hover:text-blue-600 transition flex items-center justify-center">
                <i class="fa-solid fa-arrow-left mr-1.5"></i> Return to Showroom
            </a>
        </div>
    </main>
</body>
</html>
