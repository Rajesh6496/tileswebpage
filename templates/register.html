<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GG Tiles | Register Admin Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans antialiased min-h-screen flex flex-col justify-between relative overflow-hidden">

    <!-- Design Glow Graphic -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-amber-500/5 rounded-full blur-[120px] pointer-events-none"></div>

    <header class="p-6 max-w-7xl mx-auto w-full flex justify-between items-center relative z-10">
        <div class="text-2xl font-serif font-black tracking-widest text-white">GG<span class="text-amber-500 font-sans font-light text-xl ml-1 border-l border-gray-800 pl-2 tracking-normal">TILES</span></div>
        <a href="/login" class="text-xs font-bold uppercase tracking-wider text-gray-400 hover:text-amber-500 transition"><i class="fa-solid fa-lock mr-2"></i> To Login Stage</a>
    </header>

    <!-- Form Container -->
    <main class="w-full max-w-md mx-auto p-4 relative z-10">
        <div class="bg-gray-900 border border-gray-800 p-8 rounded-3xl shadow-2xl">
            
            <div class="text-center mb-8">
                <h1 class="text-2xl font-serif font-bold text-white tracking-wide">Register Admin Node</h1>
                <p class="text-gray-400 text-xs mt-1">Configure a dynamic authorized account profile for stock control matrices.</p>
            </div>

            <!-- Error Notification -->
            {% if error %}
            <div class="bg-red-950/40 border border-red-500/30 text-red-400 text-xs p-3 rounded-xl mb-6 flex items-center space-x-2">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="/register" method="POST" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Configure Username</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-gray-500 text-sm"><i class="fa-solid fa-user-plus"></i></span>
                        <input type="text" name="username" placeholder="e.g. rajesh_admin" required class="w-full bg-gray-950 border border-gray-800 text-white pl-11 pr-4 py-3 rounded-xl focus:border-amber-500 outline-none text-sm shadow-inner font-medium">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2">Secure Entry Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-gray-500 text-sm"><i class="fa-solid fa-key"></i></span>
                        <input type="password" name="password" placeholder="••••••••" required class="w-full bg-gray-950 border border-gray-800 text-white pl-11 pr-4 py-3 rounded-xl focus:border-amber-500 outline-none text-sm shadow-inner font-medium">
                    </div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-amber-600 to-amber-700 hover:from-amber-500 hover:to-amber-600 text-white font-bold py-3.5 rounded-xl uppercase tracking-wider text-xs transition shadow-lg mt-4">
                    Instantiate Dynamic Admin
                </button>
            </form>

        </div>
    </main>

    <footer class="p-6 text-center text-xs text-gray-600">
        © 2026 GG Tiles India. Runtime Registry Security.
    </footer>
</body>
</html>
